<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morning Message</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0ede6;
      --accent: #c8f04a;
      --muted: #3a3a3a;
      --card: #141414;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--muted) 1px, transparent 1px),
        linear-gradient(90deg, var(--muted) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.18;
      pointer-events: none;
    }

    /* Glowing blob */
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(200,240,74,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.7; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 600px;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 2rem;
      animation: fadeUp 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h1 span {
      color: var(--accent);
    }

    .desc {
      font-size: 0.85rem;
      color: #888;
      line-height: 1.8;
      margin-bottom: 3rem;
      animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--accent);
      color: #0a0a0a;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      padding: 1rem 2.5rem;
      border-radius: 4px;
      letter-spacing: 0.02em;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      box-shadow: 0 0 0 0 rgba(200,240,74,0.4);
    }

    .download-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(200,240,74,0.35);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .download-btn svg {
      width: 18px;
      height: 18px;
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeUp 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .steps {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      animation: fadeUp 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .step {
      font-size: 0.72rem;
      color: #555;
      letter-spacing: 0.05em;
    }

    .step span {
      color: var(--accent);
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="tag">Windows App</div>

    <h1>Good<br/><span>Morning.</span></h1>

    <p class="desc">
      A small program that greets you every time<br/>
      you start your computer. Just run it once.
    </p>

    <!-- Replace the href below with your actual download link -->
    <a class="download-btn" href="https://raw.githubusercontent.com/gokkilight/morning-message/main/popup.exe" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v13M6 11l6 6 6-6"/><path d="M3 20h18"/>
      </svg>
      Download .exe
    </a>

    <div class="steps">
      <p class="step"><span>01</span> Run the .exe once</p>
      <p class="step"><span>02</span> It installs itself automatically</p>
      <p class="step"><span>03</span> Get greeted every boot</p>
    </div>
  </div>

  <p class="footer">Windows 10 / 11 &nbsp;·&nbsp; No install required</p>

</body>
</html>
